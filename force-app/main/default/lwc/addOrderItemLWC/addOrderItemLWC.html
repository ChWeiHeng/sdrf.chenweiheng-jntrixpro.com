<template>
	<div class="slds-is-relative">
		<template if:true={isShowSpinner} >
           <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- 手机头 -->
        <template if:false={isPC}>
            <div class="slds-grid" style="position: fixed;
            z-index: 98;
            
            left: -1.75px;
            right: 0px;
            border-radius: 0px;
            transform: translate3d(0px, -18px, 0px);
            background-color:#f3f3f3;
            border-radius:5px;
           ">
                <div class="slds-col" style="text-align: left;line-height:35px;">
                    <lightning-button label={customLabel.CancelLable} onclick={close}></lightning-button>
                </div>
                <h2 class="slds-col" style="text-align:center;line-height:35px;">
                    <!-- Manage Order Item -->
                    {customLabel.OrderItemHeader}
                </h2>
                <div class="slds-col" style="text-align: right;line-height:35px;">
                    <lightning-button variant="brand" label={customLabel.ConfirmLabel} onclick={confirmData}>
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- PC头 -->
        <template if:true={isPC}>
            <div class="slds-grid slds-modal__header">
                <lightning-card class="slds-color__background_gray-4 pageHeader" 
			        	style="position: fixed;
					    z-index: 98;
					    height: 4px;
					    left: -1.75px;
					    right: 0px;
					    border-radius: 0px;
					    transform: translate3d(0px, -30px, 0px);
					    background: #e40707;" title={customLabel.OrderItemHeader} icon-name="standard:article">
                    </lightning-card>
                </div>
        </template>

        <div class="slds-modal__content modalBody menu">
            <template if:false={isPC}>
                <template if:false={isNotShowSearch}>
                    <div style="position: fixed;
                    z-index: 98;
                    
                    left: -1.75px;
                    right: 0px;
                    border-radius: 0px;
                    transform: translate(80%, 801%);
                    ">
                        <template if:false={disableAction}>
                            <template if:false={isAutoZAR1}>
                                <lightning-icon icon-name='action:add_relationship' alternative-text='add_relationship' size='small' title='add_relationship' onclick={showSearch}></lightning-icon>
                            </template>
                        </template>
                    </div>
                </template>
                
            </template>

            <!-- PC内容 -->
            <template if:true={isPC}>
                <div style="padding-left: 10px;padding-right: 10px;">
                    <!-- 采销协同订单不显示 start -->
                    <template if:false={disableAction}>

                        <template if:false={isNotShowSearch}>
                            <template if:false={isAutoZAR1}>
                                <div style="margin-right:10px;display:inline-block;width:400px;margin-top:10px;">
                                    <lightning-input placeholder={customLabel.Search} type="text" variant="label-hidden" value={queryText} onchange={textChange}></lightning-input>
                                </div>
                                <div style="margin-left:5px;display:inline-block;">
                                    <lightning-button variant="brand" label={customLabel.searchText} onclick={queryData}></lightning-button>
                                </div>
                                <div class="condition_head_title" style="font-weight: inherit;font-size: 13px;">
                                    <span style="color: #0078d7;font-weight: inherit;font-size: 18px;">|</span> 
                                    {customLabel.Search_Result}
                                </div>
                                <lightning-card>
                                    <!-- <lightning-button variant="brand" label='Add' onclick={addData} class="slds-p-around_x-small">
                                    </lightning-button> -->
                                    <lightning-record-edit-form object-api-name="Order_Item__c" density="compact">
                                        <div class="slds-scrollable_x slds-scrollable_y" style="height: 450px;">
                                            <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                                                <thead>
                                                    <tr class="slds-line-height_reset">
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.small} title="#">{customLabel.Action}</div>
                                                        </th>
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.medium} title={customLabel.Material_Code}>{customLabel.Material_Code}</div>
                                                        </th>
                                                        <template if:true={isZAR2}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.invoiceItemNumber}>{customLabel.invoiceItemNumber}</div>
                                                            </th>
                                                        </template>
                                                        
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.medium} title={customLabel.ProductNameOrderItem}>{customLabel.ProductNameOrderItem}</div>
                                                        </th>
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.medium} title={customLabel.productDescription}>{customLabel.productDescription}</div>
                                                        </th>
                                                        
                                                        <template if:true={isShowFiled}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.FillUpOrder}>{customLabel.FillUpOrder}</div>
                                                            </th>

                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.FillUpOrderCreateDate}>{customLabel.FillUpOrderCreateDate}</div>
                                                            </th>
                                                            <template if:true={isZARF}>
                                                                <th scope="col" >
                                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.Delivery_Note_Number}>{customLabel.Delivery_Note_Number}</div>
                                                                </th>
                                                            </template>
                                                        </template>
                                                        <template if:true={isCreditNote}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.Quantity}>{customLabel.Quantity}</div>
                                                            </th>
                                                        </template>
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.medium} title={customLabel.Local_Currency}>{customLabel.Local_Currency}</div>
                                                        </th>
                                                        <template if:true={isCreditNote}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.Amount_per_item}>{customLabel.Amount_per_item}</div>
                                                            </th>
                                                        </template>
                                                        <!-- <th width={lengthData.cost} height="30px;" class="slds-text-align_left" scope="col">
                                                            <span class="tableTitle" title="ItemNm__c">{customLabel.productCost}</span>
                                                        </th> -->
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.medium} title={customLabel.Basic_Unit}>{customLabel.Basic_Unit}</div>
                                                        </th>
                                                        <template if:false={isCreditNote}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.Available_Inventory}>{customLabel.Available_Inventory}</div>
                                                            </th>

                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.Approving_Inventory}>{customLabel.Approving_Inventory}</div>
                                                            </th>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.Place_order}>{customLabel.Place_order}</div>
                                                            </th>
                                                        </template>
                                                        
                                                        <template if:true={isFROMInvoice}>
                                                            <th scope="col" >
                                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.FECHA_DE_PAGO}>{customLabel.FECHA_DE_PAGO}</div>
                                                            </th>
                                                        </template>
                                                        
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template if:true={productItemList}>
                                                        <template for:each={productItemList} for:item=info for:index="index">
                                                            <tr key={info.indexNum} class="slds-hint-parent">
                                                                <td>
                                                                    <div class="slds-truncate">
                                                                        <lightning-button-icon icon-name="utility:add" data-record={index} onclick={selectChange}></lightning-button-icon>
                                                                    </div>
                                                                </td>
                                                                <td>
                                                                    <div class="slds-truncate slds-cell-wrap">
                                                                        {info.materialCode}
                                                                    </div>
                                                                </td>
                                                                <template if:true={isZAR2}>
                                                                    <td>
                                                                        <div class="slds-truncate slds-cell-wrap">
                                                                            {info.invoiceItemNumber}
                                                                        </div>
                                                                    </td>
                                                                </template>
                                                                <td>
                                                                    <div class="slds-truncate slds-cell-wrap">
                                                                        {info.productName}
                                                                    </div>
                                                                </td>
                                                                <td>
                                                                    <div class="slds-truncate slds-cell-wrap">
                                                                        {info.productDescription}
                                                                    </div>
                                                                </td>
                                                                <template if:true={isShowFiled}>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.oldCode} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.createDate} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                    <template if:true={isZARF}>
                                                                        <td>
                                                                            <div class="slds-truncate">
                                                                                <lightning-input type="text" value={info.deliveryNoteNumber} variant="label-hidden" disabled=true></lightning-input>
                                                                            </div>
                                                                        </td>
                                                                    </template>
                                                                </template>
                                                                <template if:true={isCreditNote}>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.quantity} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                </template>
                                                                <td>
                                                                    <div class="slds-truncate">
                                                                        <lightning-input type="text" value={info.Price} variant="label-hidden" disabled=true></lightning-input>
                                                                    </div>
                                                                </td>
                                                                <template if:true={isCreditNote}>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.amount} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                </template>
                                                                <!-- <td class="slds-cell-wrap" style="border-bottom: 1px solid #ddd;" width={lengthData.cost}>
                                                                    <lightning-input type="text" value={info.cost} variant="label-hidden" disabled=true></lightning-input>
                                                                </td> -->
                                                                <td>
                                                                    <div class="slds-truncate">
                                                                        <lightning-input type="text" value={info.salesUnitName} variant="label-hidden" disabled=true></lightning-input>
                                                                    </div>
                                                                </td>

                                                                <template if:false={isCreditNote}>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.availableInventory} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
        
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.approvingInventory} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                    <template if:true={info.placeOrder}>
                                                                        <td>
                                                                            <div class="slds-truncate">
                                                                                <lightning-input type="checkbox" value={info.placeOrder} variant="label-hidden" checked disabled=true></lightning-input>
                                                                            </div>
                                                                        </td>
                                                                    </template>
        
                                                                    <template if:false={info.placeOrder}>
                                                                        <td>
                                                                            <div class="slds-truncate">
                                                                                <lightning-input type="checkbox" value={info.placeOrder} variant="label-hidden" disabled=true></lightning-input>
                                                                            </div>
                                                                        </td>
                                                                    </template>
                                                                </template>

                                                                <template if:true={isFROMInvoice}>
                                                                    <td>
                                                                        <div class="slds-truncate">
                                                                            <lightning-input type="text" value={info.FECHA_DE_PAGO} variant="label-hidden" disabled=true></lightning-input>
                                                                        </div>
                                                                    </td>
                                                                    
                                                                </template>
                                                            </tr>
                                                        </template>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </lightning-record-edit-form>
                                    
                                </lightning-card>
                            </template>
                        </template>
                        
                    </template>
                    <!-- 采销协同订单不显示 end -->

                    <div class="condition_head_title" style="display: inline-block;font-weight: inherit;font-size: 13px;">
                        <span style="color: #0078d7;font-weight: inherit;font-size: 18px;">|</span> 
                        {customLabel.OrderItem}
                    </div>
                    <lightning-card>
                        <!-- <lightning-button variant="brand" label='Add' onclick={addData} class="slds-p-around_x-small">
                        </lightning-button> -->
                        <lightning-record-edit-form object-api-name="Order_Item__c" density="compact">
                            <div class="slds-scrollable_x slds-scrollable_y" style="height: 450px;">
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th scope="col" >
                                                <div class="slds-truncate" style={lengthData.small} title="#">#</div>
                                            </th>
                                            <th scope="col" >
                                                <div class="slds-truncate" style={lengthData.medium} title={customLabel.ProductNameOrderItem}>{customLabel.ProductNameOrderItem}</div>
                                            </th>
                                            <template if:true={isZAR2}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.invoiceItemNumber}>{customLabel.invoiceItemNumber}</div>
                                                </th>
                                            </template>
                                            <template if:true={isZARF}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.Product_Code}>{customLabel.Product_Code}</div>
                                                </th>
                                            </template>
                                            <template if:true={isZARF}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.ZAREOrderNumber}>{customLabel.ZAREOrderNumber}</div>
                                                </th>
                                            </template>
                                            <template if:true={isZARF}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.Delivery_Note_Number}>{customLabel.Delivery_Note_Number}</div>
                                                </th>
                                            </template>
                                            <template if:false={isCreditNote}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.Product_Type}>
                                                        <span class="tableTitle" title="PreProjectStatus__c"><span style="color:red">*</span>{customLabel.Product_Type}</span>
                                                    </div>
                                                </th>
                                            </template>
                                            
                                            <th scope="col" >
                                                <div class="slds-truncate" style={lengthData.mediumSmall} title={customLabel.Quantity}>
                                                    <span class="tableTitle" title="ItemNm__c"><span style="color:red">*</span>{customLabel.Quantity}</span>
                                                </div>
                                            </th>
                                            <!-- <th width={lengthData.Quantity} height="30px;" class="slds-text-align_left" scope="col">
                                                <span class="tableTitle" title="ItemNm__c">Basic Quantity</span>
                                            </th> -->
                                            <template if:false={isZFD}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.mediumSmall} title={customLabel.Price}>
                                                        <template if:true={cu}>
                                                            <span class="tableTitle" title="SalesRep__c"><span style="color:red">*</span>{customLabel.Price}({cu})</span>
                                                        </template>
                                                    </div>
                                                </th>
                                            </template>
                                            
                                            <template if:false={isZFD}>
                                                <template if:false={isCreditNote}>
                                                    <template if:true={showCashPrice}>
                                                        <th scope="col" >
                                                            <div class="slds-truncate" style={lengthData.mediumSmall} title={customLabel.Price}>
                                                                <template if:true={cu}>
                                                                    <span class="tableTitle" title="SalesRep__c">{customLabel.CashPrice}</span>
                                                                </template>
                                                            </div>
                                                        </th>
                                                    </template>
                                                </template>
                                            </template>
                                            
                                            <!-- <template if:false={disableAction}>
                                                <th width={lengthData.cost} height="30px;" class="slds-text-align_left slds-cell-wrap" scope="col">
                                                    <span class="tableTitle" title="SalesRep__c">{customLabel.productCost}({cu})</span>
                                                </th>
                                            </template> -->
                                            <template if:false={isCreditNote}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.medium} title={customLabel.Sales_Unit}>
                                                        <span class="tableTitle" title="SalesRep__c"><span style="color:red">*</span>{customLabel.Sales_Unit}</span>
                                                    </div>
                                                </th>
                                            </template>
                                            
                                            <template if:false={isZFD}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.Amount_per_item} title={customLabel.Amount_per_item}>
                                                        <!-- <span style="color:red;">*</span> -->
                                                        <span class="tableTitle" title="BuildAddr__c">{customLabel.Amount_per_item}</span>
                                                    </div>
                                                </th>
                                            </template>

                                                <th width={lengthData.MarginRate} height="30px;" class="slds-text-align_left slds-cell-wrap" scope="col">
                                                    <span class="tableTitle" title="BuildAddr__c">{customLabel.MarginRate}</span>
                                                </th>
                                            </template> -->
                                            <template if:true={isFROMInvoice}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.FECHA_DE_VENCIMIENTO}>
                                                        <span class="tableTitle" title="PreProjectStatus__c"><span style="color:red">*</span>{customLabel.FECHA_DE_VENCIMIENTO}</span>
                                                    </div>
                                                </th>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.FECHA_DE_PAGO}>
                                                        <span class="tableTitle" title="PreProjectStatus__c">{customLabel.FECHA_DE_PAGO}</span>
                                                    </div>
                                                </th>
                                            </template>
                                            
                                            <template if:false={isCreditNote}>
                                                <th scope="col" >
                                                    <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.Delivery_Date}>
                                                        <span class="tableTitle" title="PreProjectStatus__c"><span style="color:red">*</span>{customLabel.Delivery_Date}</span>
                                                    </div>
                                                </th>
                                                <!-- 墨西哥特殊字段 -->
                                                <template if:true={isMX}>
                                                    <th scope="col" >
                                                        <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.Toxicity_Classification}>
                                                            <span class="tableTitle" title="PreProjectStatus__c">{customLabel.Toxicity_Classification}</span>
                                                        </div>
                                                    </th> 
                                                </template>
                                                
                                                
                                                <template if:false={disableAction}>
                                                    <th scope="col" >
                                                        <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.Inventory}>

                                                        </th>
                                                    </template>
                                                </template>
                                                <th scope="col" >

                                                <th scope="col" >

                                                        <span class="tableTitle" title="PreProjectStatus__c">{customLabel.Net_Weight}</span>
                                                    </div>
                                                </th>
                                                <template if:true={showCommission}>
                                                    <th scope="col" >
                                                        <div class="slds-truncate" style={lengthData.medium} title={customLabel.Commission_Calculation_Method}>
                                                            <span class="tableTitle" title="CommissionType__c">{customLabel.Commission_Calculation_Method}</span>
                                                        </div>
                                                    </th>
                                                    <th scope="col" >
                                                        <div class="slds-truncate" style={lengthData.mediumBig} title={customLabel.Commission_Rate}>
                                                            <span class="tableTitle" title="Commission_Rate__c">{customLabel.Commission_Rate}</span>
                                                        </div>
                                                    </th>
                                                    <th scope="col" >

                                                            <span class="tableTitle" title="CommissionAmount__c">{customLabel.Commission_Amount}</span>

                                                    </th>

                                                            <span class="tableTitle" title="PreProjectStatus__c">{customLabel.Action}</span>
                                                        </div>
                                                    </th>
                                                </template>

                                        </tr>
                                    </thead>
                                    <template if:true={orderItemList}>
                                        
                                        <tbody>
                                            <template for:each={orderItemList} for:item=info for:index="index">
                                                <template if:true={info.orderItemData}>
                                                    <tr key={info.indexNum} class="slds-hint-parent">
                                                        <td>
                                                            <div class="slds-truncate">

                                                                </lightning-input-field> -->

                                                                    </lightning-input-field> -->

                <div class="">
                    <lightning-button label={customLabel.CancelLable} onclick={close} class="slds-p-around_x-small"></lightning-button>
                    <lightning-button variant="brand" label={customLabel.ConfirmLabel} onclick={confirmData} class="slds-p-around_x-small">
                    </lightning-button>
                </div>
            </div>
        </template>
    </div>

    <!-- 手机添加产品页面 -->
    <template if:true={showSearchPage}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container " style="max-width:100%;width:87% !important">
                <template if:true={isShowSpinner} >
                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__header">
                    <div class="slds-col" style="font-weight: 900;font-size: large;display: inline-block;float: left;">
                        Search Data
                    </div>
                    
                    <div class="slds-col" style="display: inline-block;float: right;">
	                   	<div class="slds-col" style="display: inline-block;margin-right: 5px;">
	                        <lightning-button variant="neutral" style="font-size: 16px;margin-right: 5pox;" label={customLabel.CancelLable}  onclick={cancelAddPage}></lightning-button>
	                    </div>
	                </div>
                </div>

                <div class="slds-modal__content modalBody menu" style="background-color: rgb(243, 242, 242) !important;">
                	<div style="background-color: rgb(255, 255, 255);padding:16px;margin-bottom:20px;">
	                	<div style="padding-left: 10px;padding-right: 10px;">
                            <div style="margin-right:10px;display:inline-block;width:250px;margin-top:10px;">
                                <lightning-input placeholder={customLabel.Search} type="text" variant="label-hidden" value={queryText} onchange={textChange}></lightning-input>
                            </div>
                            <div style="display:inline-block;margin-top:10px;">
                                <lightning-button variant="brand" label={customLabel.searchText} onclick={queryData}></lightning-button>
                            </div>
                            <div class="condition_head_title" style="font-weight: inherit;font-size: 13px;">
                                <span style="color: #0078d7;font-weight: inherit;font-size: 18px;">|</span> 
                                {customLabel.Search_Result}
                            </div>
                            <lightning-card>
                                <lightning-record-edit-form object-api-name="Order_Item__c" density="compact">
                                    <template if:true={productItemList}>
                                        <template for:each={productItemList} for:item=info for:index="index">
                                            <div key={info.indexNum} style="border: 1px solid rgb(201 201 201);margin-top:10px;">
                                                <lightning-card>
                                                    <div class="slds-grid slds-wrap" >
                                                        <div class="slds-col slds-size_12-of-12 slds-p-horizontal_x-small">
                                                        <!--     <div class="slds-grid slds-wrap" >
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">

                                                                </div>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-button-icon variant="brand" icon-name="utility:add" size="xx-small" value={index} onclick={selectChange}></lightning-button-icon>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="slds-col slds-size_11-of-12 slds-p-horizontal_x-small"> -->
                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                <lightning-input type="text" value={info.materialCode} label= {customLabel.Material_Code} disabled=true></lightning-input> 
                                                            </div>
                                                            <template if:true={isZAR2}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.invoiceItemNumber} label= {customLabel.invoiceItemNumber} disabled=true></lightning-input> 
                                                                </div>
                                                            </template>
                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small slds-cell-wrap">
                                                                <label>{customLabel.ProductNameOrderItem}</label>
                                                                <div class="slds-cell-wrap">{info.productName}</div>
                                                            </div> 
                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small slds-cell-wrap">
                                                                <label>{customLabel.productDescription}</label>
                                                                <div class="slds-cell-wrap">{info.productDescription}</div>
                                                            </div> 

                                                            <template if:true={isShowFiled}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.oldCode} label={customLabel.FillUpOrder} disabled=true></lightning-input>
                                                                </div> 

                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.createDate} label={customLabel.FillUpOrderCreateDate} disabled=true></lightning-input>
                                                                </div> 
                                                                <template if:true={isZARF}>
                                                                    <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                        <lightning-input type="text" value={info.deliveryNoteNumber} label={customLabel.Delivery_Note_Number} disabled=true></lightning-input>
                                                                    </div> 
                                                                </template>
                                                            </template>
                                                            <template if:true={isCreditNote}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.quantity} label={customLabel.Quantity} disabled=true></lightning-input> 
                                                                </div> 
                                                            </template>
                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                <lightning-input type="text" value={info.Price} label={customLabel.Local_Currency} disabled=true></lightning-input> 
                                                            </div> 
                                                            <!-- <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                <lightning-input type="text" value={info.Cost} label={customLabel.productCost} disabled=true></lightning-input> 
                                                            </div>  -->
                                                            <template if:true={isCreditNote}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.amount} label={customLabel.Amount_per_item} disabled=true></lightning-input> 
                                                                </div> 
                                                            </template>

                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                <lightning-input type="text" value={info.salesUnitName} label={customLabel.Basic_Unit} disabled=true></lightning-input> 
                                                            </div>
                                                            <template if:false={isCreditNote}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.availableInventory} label={customLabel.Available_Inventory} disabled=true></lightning-input>
                                                                </div> 
    
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.approvingInventory} label={customLabel.Approving_Inventory} disabled=true></lightning-input>
                                                                </div> 
    
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <template if:true={info.placeOrder}>
                                                                        <td class="slds-cell-wrap" style="border-bottom: 1px solid #ddd;" width={lengthData.DeliveryDate}>
                                                                            <label>{customLabel.Place_order}</label>
                                                                            <lightning-input label="Place Order" type="checkbox" value={info.placeOrder} variant="label-hidden" checked disabled=true></lightning-input>
                                                                        </td>
                                                                    </template>
                        
                                                                    <template if:false={info.placeOrder}>
                                                                        <td class="slds-cell-wrap" style="border-bottom: 1px solid #ddd;" width={lengthData.DeliveryDate}>
                                                                            <label>{customLabel.Place_order}</label>
                                                                            <lightning-input label="Place Order" type="checkbox" value={info.placeOrder} variant="label-hidden" disabled=true></lightning-input>
                                                                        </td>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:true={isFROMInvoice}>
                                                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                    <lightning-input type="text" value={info.FECHA_DE_PAGO} label={customLabel.FECHA_DE_PAGO} disabled=true></lightning-input> 
                                                                </div>
                                                            </template>
                                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                                <div style="text-align:center;background-color:#0176d3;border-radius:5px;" onclick={selectChange} data-record={index}>
                                                                    <lightning-button-icon variant="brand" icon-name="utility:add" size="x-small" value={index}></lightning-button-icon>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </lightning-card>
                                            </div>
                                            
                                        </template>
                                    </template>
                                </lightning-record-edit-form>
                            </lightning-card>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
