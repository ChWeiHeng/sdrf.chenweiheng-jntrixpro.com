<!-- attachmentManager.html -->
<template>
    <lightning-card title="Attachment Management" icon-name="standard:file">
        <div class="slds-m-around_medium">
            <!-- 文件上传组件 -->
            <lightning-file-upload
                label={Upload}
                name="fileUploader"
                accept={acceptedFormats}
                onuploadfinished={handleUploadFinished}
            ></lightning-file-upload>
        </div>

        <!-- 附件列表 -->
        <template if:true={isPC}>
            <div class="slds-m-top_medium">
                <template if:true={showDataTable}>
                    <lightning-datatable
                        key-field="Link__c"
                        data={attachmentsData}
                        columns={columns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}
                    ></lightning-datatable>
                </template>
                <template if:false={showDataTable}>
                    <lightning-datatable
                        key-field="Link__c"
                        data={attachmentsData}
                        columns={columns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}
                    ></lightning-datatable>
                </template>
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="loading..."></lightning-spinner>
                </template>
            </div>
        </template>

        <template if:false={isPC}>
            <div class="slds-m-top_medium">
                <template for:each={attachmentsData} for:item=info for:index="index">
                    <div key={info.index} style="border: 1px solid rgb(201 201 201);margin-top:10px;">
                        <lightning-card icon-name="standard:article">
                            <div slot="actions">
                                <lightning-button-icon icon-name="utility:delete" onclick={deleteData} data-index={index}></lightning-button-icon>
                            </div>
                            <div class="slds-p-around_medium slds-grid slds-wrap">
                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                    <lightning-input type="text" value={info.Name} label={customLabel.FileName} disabled=true></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                    <lightning-input type="text" value={info.File_Type__c} label={customLabel.FileType} disabled=true></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                    <lightning-input type="text" value={info.Size_Kb__c} label={customLabel.ContentSize} disabled=true></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                    <lightning-input type="text" value={info.CreatedDate} label={customLabel.CreatedDate} disabled=true></lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                    <p><lightning-formatted-url value={info.Link__c} tooltip="" label={customLabel.link} target="_blank" ></lightning-formatted-url></p>
                                    <!-- <lightning-input type="url" value={info.Link__c} label={link} disabled=true></lightning-input> -->
                                </div>
                            </div>
                            
                        </lightning-card>
                    </div>
                </template>
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="loading..."></lightning-spinner>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
